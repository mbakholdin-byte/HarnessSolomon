name: Deploy Docs

on:
  push:
    branches: [main]
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'
  pull_request:
    branches: [main]  # Need branch to enable PR previews
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs.yml'

# Allow deploy job to comment on PRs
permissions:
  contents: read
  pages: write
  id-token: write
  pull-requests: write  # For PR preview comments

# Cancel in-progress runs on new push to same PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: docs-site/package-lock.json

      - name: Install dependencies
        working-directory: docs-site
        run: npm ci

      - name: Typecheck
        working-directory: docs-site
        run: npm run typecheck || true  # Don't fail build on type errors

      - name: Build site (with base URL for PR previews)
        working-directory: docs-site
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_URL="/harness/${{ github.event.pull_request.number }}/" npm run build
          else
            npm run build
          fi
        env:
          BASE_URL: /

      - name: Smoke test (check critical pages exist)
        working-directory: docs-site
        run: |
          test -f build/index.html || (echo "ERROR: build/index.html missing" && exit 1)
          test -f build/harness-roadmap-live.html || (echo "WARN: harness-roadmap-live.html missing" && true)
          test -d build/tutorials || (echo "ERROR: tutorials dir missing" && exit 1)
          echo "✓ Smoke test passed"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: docs-build-${{ github.event_name }}
          path: docs-site/build
          retention-days: 7

      - name: Deploy to GitHub Pages (production)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-site/build

      - name: Deploy to GitHub Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages

  lighthouse:
    name: Lighthouse Audit (production only)
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Pages deploy
        run: sleep 30

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: .github/lighthouserc.json
          uploadArtifacts: true
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  comment-pr:
    name: Comment PR with preview URL
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Comment PR
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: docs-preview
          message: |
            📚 **Docs preview ready!**
            - Build: ${{ github.event.pull_request.head.sha }}
            - Preview URL: https://harness-${{ github.event.pull_request.number }}.preview.harness.dev
            - Auto-deploys on push to this PR
            - Lighthouse audit runs on merge to main
